<!DOCTYPE html>
<html>
<head>
<title>IRIS PREDICTOR</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
</head>
<body>

<div class="card">

    <p class="eyebrow">Fisher Iris Dataset · 1936</p>
    <h1>Iris Flower Predictor</h1>
    <p class="subtitle">Measure a bloom, in centimetres, to name its species</p>

    <div class="ruler"></div>

    <form action="/predict" method="post">

        <div class="field">
            <label>Sepal · Length <span>(cm)</span></label>
            <input name="sl" placeholder="e.g. 5.1" required>
        </div>

        <div class="field">
            <label>Sepal · Width <span>(cm)</span></label>
            <input name="sw" placeholder="e.g. 3.5" required>
        </div>

        <div class="field">
            <label>Petal · Length <span>(cm)</span></label>
            <input name="pl" placeholder="e.g. 1.4" required>
        </div>

        <div class="field">
            <label>Petal · Width <span>(cm)</span></label>
            <input name="pw" placeholder="e.g. 0.2" required>
        </div>

        <button type="submit">Identify Specimen</button>

    </form>

    {% if result %}
    <div class="result-wrap">
        <div class="specimen-tag
            {% if 'setosa' in result|lower %}tag-setosa
            {% elif 'versicolor' in result|lower %}tag-versicolor
            {% elif 'virginica' in result|lower %}tag-virginica
            {% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6">
                <path d="M12 2C9 5 9 9 12 12C15 9 15 5 12 2Z"/>
                <path d="M12 12C9 12 6 13 4 16C7 18 10 17 12 12Z"/>
                <path d="M12 12C15 12 18 13 20 16C17 18 14 17 12 12Z"/>
                <path d="M12 12V22"/>
            </svg>
            <div class="tag-text">
                <p class="tag-label">Predicted species</p>
                <p class="tag-species">{{ result }}</p>
            </div>
        </div>
    </div>
    {% endif %}

</div>

</body>
</html>
